<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAA AD Fetcher</title>
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        :root {
            --primary-color: #0068c9;
            --primary-dark: #0056b3;
            --bg-color: #f0f0f0;
            --card-bg-color: #ffffff;
            --text-color: #333;
            --border-color: #ccc;
            --box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --orange-btn: #fa9e61;
            --green-btn: #B4CEA1;
            --result-bg: #f8f9fa;
            --danger: #dc3545;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0.5rem;
            display: flex;
            justify-content: center;
            font-size: 14px;
        }

        .app-container {
            width: 100%;
            max-width: 950px;
            background-color: var(--card-bg-color);
            padding: 15px;
            border-radius: 8px;
            box-shadow: var(--box-shadow);
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            font-size: 1.4em;
            margin-top: 0;
            margin-bottom: 12px;
            color: var(--primary-color);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 4px;
            color: #555;
        }

        .input-group input[type="text"] {
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.95em;
            font-family: var(--font-family);
        }

        .format-toggle {
            display: flex;
            gap: 0;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #bbb;
            flex-shrink: 0;
        }

        .format-toggle label {
            padding: 8px 14px;
            font-size: 0.85em;
            cursor: pointer;
            background: #e7e7e7;
            transition: 0.2s;
            white-space: nowrap;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .format-toggle input[type="radio"] { display: none; }

        .format-toggle input[type="radio"]:checked + label {
            background: var(--primary-color);
            color: white;
        }

        button.fetch-btn {
            padding: 8px 20px;
            background: var(--orange-btn);
            color: white;
            border: 1px solid #e08e51;
            border-radius: 4px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-family);
            flex-shrink: 0;
            white-space: nowrap;
        }

        button.fetch-btn:hover { background: #e08e51; }
        button.fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        button.print-btn {
            padding: 8px 20px;
            background: var(--green-btn);
            color: #333;
            border: 1px solid #9ab88a;
            border-radius: 4px;
            font-size: 0.95em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-family);
            flex-shrink: 0;
            white-space: nowrap;
        }

        button.print-btn:hover { background: #a0be8e; }

        /* Status / log area */
        .status-bar {
            font-size: 0.85em;
            color: #666;
            min-height: 1.4em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar.error { color: var(--danger); font-weight: bold; }

        .spinner {
            width: 14px; height: 14px;
            border: 2px solid #ccc;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* AD result cards */
        .ad-card {
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 16px;
            overflow: hidden;
            animation: fadeIn 0.3s;
        }

        .ad-card-header {
            background: var(--primary-color);
            color: white;
            padding: 8px 14px;
            font-weight: bold;
            font-size: 0.95em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ad-card-header .ad-doc-num {
            font-weight: normal;
            font-size: 0.8em;
            opacity: 0.85;
        }

        .ad-card-body {
            padding: 14px;
            max-height: 70vh;
            overflow-y: auto;
        }

        /* HTML content styling */
        .ad-card-body.html-content {
            font-family: "Times New Roman", Times, serif;
            font-size: 10pt;
            line-height: 1.3;
            color: #000;
            text-align: justify;
        }

        .ad-card-body.html-content h1:first-of-type,
        .ad-card-body.html-content .document-heading {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 12pt;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 14pt;
            margin-bottom: 8pt;
            text-align: left;
            border: none;
            padding: 0;
        }

        .ad-card-body.html-content h1:not(:first-of-type) {
            font-family: "Times New Roman", Times, serif;
            font-size: 10pt;
            font-weight: bold;
            text-transform: none;
            color: #000;
            margin-top: 10pt;
            margin-bottom: 3pt;
            text-align: left;
        }

        .ad-card-body.html-content h2,
        .ad-card-body.html-content h3,
        .ad-card-body.html-content h4,
        .ad-card-body.html-content h5 {
            font-family: "Times New Roman", Times, serif;
            font-weight: bold;
            text-align: left;
            margin-top: 10pt;
            margin-bottom: 3pt;
            font-size: 10pt;
        }

        .ad-card-body.html-content p {
            margin-top: 0;
            margin-bottom: 4pt;
            text-indent: 1.5em;
        }

        .ad-card-body.html-content p.indent-0,
        .ad-card-body.html-content p.no-indent { text-indent: 0; }

        .ad-card-body.html-content ul,
        .ad-card-body.html-content ol {
            margin-top: 0;
            margin-bottom: 4pt;
            padding-left: 2em;
        }

        .ad-card-body.html-content li p { text-indent: 0; }

        .ad-card-body.html-content a { color: #000; text-decoration: none; }

        .ad-card-body.html-content table {
            border-collapse: collapse;
            margin: 8pt 0;
            font-size: 9pt;
            width: 100%;
        }

        .ad-card-body.html-content th,
        .ad-card-body.html-content td {
            border: 1px solid #999;
            padding: 3pt 6pt;
            text-align: left;
            text-indent: 0;
        }

        .ad-card-body.html-content th {
            background: #eee;
            font-weight: bold;
        }

        /* Plain text styling */
        .ad-card-body.text-content {
            white-space: pre-wrap;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 9pt;
            line-height: 1.35;
        }

        .no-results {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 1em;
        }

        .no-results .hint {
            margin-top: 8px;
            font-size: 0.85em;
            color: #aaa;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ───── Print styles ───── */
        @media print {
            body {
                background: white;
                padding: 0;
                font-size: 9.5pt;
            }

            .app-container {
                box-shadow: none;
                border: none;
                padding: 0;
                max-width: 100%;
            }

            .controls, .status-bar, h1, button.print-btn,
            .ad-card-header .ad-doc-num { display: none !important; }

            .ad-card {
                border: none;
                break-inside: avoid;
                page-break-inside: avoid;
                margin: 0;
            }

            .ad-card-header {
                background: none !important;
                color: #000 !important;
                padding: 0 0 4pt 0;
                font-size: 11pt;
                border-bottom: 1px solid #000;
                margin-bottom: 8pt;
                print-color-adjust: exact;
                -webkit-print-color-adjust: exact;
            }

            .ad-card-body {
                max-height: none;
                overflow: visible;
                padding: 0;
                column-count: 2;
                column-gap: 0.35in;
            }

            .ad-card-body.html-content {
                font-size: 9.5pt;
                line-height: 1.15;
            }

            .ad-card-body.text-content {
                font-size: 8pt;
                line-height: 1.2;
            }

            @page {
                margin: 0.6in 0.75in;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <h1>FAA AD Fetcher</h1>

        <div class="controls" id="controls">
            <div class="input-group">
                <label for="adInput">AD Number(s), comma-separated</label>
                <input type="text" id="adInput" placeholder="e.g. 2020-15-14, 2018-04-07" autocomplete="off">
            </div>

            <div class="format-toggle">
                <input type="radio" name="fmt" id="fmtHtml" value="html" checked>
                <label for="fmtHtml">Clean HTML</label>
                <input type="radio" name="fmt" id="fmtText" value="text">
                <label for="fmtText">Plain Text</label>
            </div>

            <button class="fetch-btn" id="fetchBtn" onclick="fetchADs()">Fetch ADs</button>
            <button class="print-btn" id="printBtn" onclick="window.print()" style="display:none;">Print / Save PDF</button>
        </div>

        <div class="status-bar" id="statusBar">
            <span>Enter one or more AD numbers above and click Fetch.</span>
        </div>

        <div id="results">
            <!-- AD cards render here -->
        </div>
    </div>

    <script>
        const API_BASE = 'https://www.federalregister.gov/api/v1/articles.json';

        function getFormat() {
            return document.querySelector('input[name="fmt"]:checked').value;
        }

        function setStatus(msg, isError = false, showSpinner = false) {
            const bar = document.getElementById('statusBar');
            bar.className = 'status-bar' + (isError ? ' error' : '');
            bar.innerHTML = (showSpinner ? '<div class="spinner"></div>' : '') + `<span>${msg}</span>`;
        }

        // Allow Enter key to trigger fetch
        document.getElementById('adInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') fetchADs();
        });

        async function fetchADs() {
            const input = document.getElementById('adInput').value.trim();
            if (!input) {
                setStatus('Please enter at least one AD number.', true);
                return;
            }

            const adNumbers = input.split(',').map(s => s.trim()).filter(Boolean);
            if (adNumbers.length === 0) {
                setStatus('No valid AD numbers found.', true);
                return;
            }

            const format = getFormat();
            const resultsDiv = document.getElementById('results');
            const fetchBtn = document.getElementById('fetchBtn');
            const printBtn = document.getElementById('printBtn');

            resultsDiv.innerHTML = '';
            printBtn.style.display = 'none';
            fetchBtn.disabled = true;

            let successCount = 0;

            for (let i = 0; i < adNumbers.length; i++) {
                const adNum = adNumbers[i];
                setStatus(`Fetching ${adNum} (${i + 1}/${adNumbers.length})...`, false, true);

                try {
                    const candidates = await searchAD(adNum);
                    if (!candidates || candidates.length === 0) {
                        resultsDiv.appendChild(makeErrorCard(adNum, 'Not found in the Federal Register.'));
                        continue;
                    }

                    let found = false;
                    for (const article of candidates) {
                        const contentUrl = format === 'html'
                            ? article.body_html_url
                            : article.raw_text_url;

                        if (!contentUrl) continue;

                        let rawContent;
                        try {
                            rawContent = await fetchContent(contentUrl);
                        } catch (_) { continue; }

                        // Verify: the AD number must appear in the preamble
                        // (before the first "(a) Effective Date" or "(a) Applicability")
                        // not just somewhere in the cross-reference sections.
                        if (!adNumberInPreamble(rawContent, adNum)) continue;

                        const cleanContent = stripPreamble(rawContent, format);
                        const title = article.title || adNum;
                        const docNum = article.document_number || '';

                        resultsDiv.appendChild(makeADCard(adNum, title, docNum, cleanContent, format));
                        successCount++;
                        found = true;
                        break;
                    }

                    if (!found) {
                        resultsDiv.appendChild(makeErrorCard(adNum, 'AD not found — results did not match the requested AD number.'));
                    }

                } catch (err) {
                    resultsDiv.appendChild(makeErrorCard(adNum, `Error: ${err.message}`));
                }
            }

            fetchBtn.disabled = false;

            if (successCount > 0) {
                printBtn.style.display = '';
                setStatus(`Done — fetched ${successCount} of ${adNumbers.length} AD(s).`);
            } else {
                setStatus('No ADs were successfully fetched.', true);
            }
        }

        // Returns an array of candidate articles, sorted so that title-matches
        // come first. The caller (fetchADs) is responsible for verifying
        // which candidate is the correct AD by checking the preamble.
        async function searchAD(adNumber) {
            const fieldsStr = ['pdf_url', 'document_number', 'title', 'body_html_url', 'raw_text_url']
                .map(f => `fields[]=${f}`).join('&');

            const url = `${API_BASE}?` +
                `conditions[agencies][]=federal-aviation-administration&` +
                `conditions[type][]=RULE&` +
                `conditions[term]=${encodeURIComponent(adNumber)}&` +
                `per_page=20&${fieldsStr}`;

            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`API returned ${resp.status}`);
            const data = await resp.json();

            const results = data.results || [];
            if (results.length === 0) return null;

            // Filter to AD-related results only
            const adResults = results.filter(r =>
                r.title && r.title.toLowerCase().includes('airworthiness direct')
            );
            const candidates = adResults.length > 0 ? adResults : results;

            // Sort so that title-matches come first (most likely correct)
            candidates.sort((a, b) => {
                const aHas = a.title && a.title.includes(adNumber) ? 0 : 1;
                const bHas = b.title && b.title.includes(adNumber) ? 0 : 1;
                return aHas - bHas;
            });

            return candidates;
        }

        // Check whether the AD number is the *subject* of this document by
        // verifying it appears in the amendment designation line — the short block
        // immediately before "(a) Effective Date". This line reads:
        //   "XXXX-XX-XX  The Manufacturer: Amendment 39-NNNNN; Docket No. ..."
        // Cross-references to other ADs (which cause false positives) appear much
        // earlier in the supplementary discussion section, far from this marker.
        function adNumberInPreamble(content, adNumber) {
            // Strip HTML tags for a clean text search
            const text = content.replace(/<[^>]*>/g, ' ');

            // Find "(a) Effective Date" or "Effective Date (a)" — the anchor point
            const anchorMatch = text.search(/\(a\)\s*(?:This\s+)?(?:airworthiness\s+directive|AD)\s+(?:is\s+)?(?:becomes?\s+)?effective|\(a\)\s*Effective\s+Date|Effective\s+Date\s*\(a\)/i);

            if (anchorMatch !== -1) {
                // The amendment designation line sits within ~500 chars before (a)
                const windowStart = Math.max(0, anchorMatch - 500);
                const window = text.substring(windowStart, anchorMatch);
                return window.includes(adNumber);
            }

            // Fallback: if we can't find the (a) anchor, check the last 1000 chars
            // of the first 4000 chars (still avoids the deep-reference sections)
            const head = text.substring(0, 4000);
            return head.substring(head.length - 1000).includes(adNumber);
        }

        // Fetch content with CORS proxy fallback.
        // The FR search API supports CORS, but its document content URLs do not,
        // so we route them through a public CORS proxy.
        const CORS_PROXIES = [
            url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
            url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
            url => 'https://corsproxy.io/?' + encodeURIComponent(url),
        ];

        async function fetchContent(url) {
            // Try direct fetch first (works when served from same origin or CORS is enabled)
            try {
                const resp = await fetch(url);
                if (resp.ok) return await resp.text();
            } catch (_) { /* CORS block — fall through to proxies */ }

            // Try each CORS proxy in turn
            for (const makeProxyUrl of CORS_PROXIES) {
                try {
                    const proxyUrl = makeProxyUrl(url);
                    const resp = await fetch(proxyUrl);
                    if (resp.ok) return await resp.text();
                } catch (_) { /* try next proxy */ }
            }

            throw new Error('Content fetch failed — all CORS proxies returned errors. Try again later.');
        }

        function stripPreamble(content, format) {
            if (format === 'html') {
                // Find <h1> containing "PART 39" and trim everything before it
                const match = content.match(/(<h1[^>]*>\s*PART 39.*?AIRWORTHINESS DIRECTIVES\s*<\/h1>)/is);
                if (match) {
                    content = content.substring(content.indexOf(match[0]));
                } else {
                    // Fallback: look for the text with HTML entity mdash
                    const idx = content.indexOf('PART 39&mdash;AIRWORTHINESS DIRECTIVES');
                    if (idx !== -1) {
                        const start = content.lastIndexOf('<h1', idx);
                        if (start !== -1) {
                            content = content.substring(start);
                        }
                    }
                }

                // Remove Federal Register UI elements (page markers, icons, etc.)
                // These are <span> elements with class "unprinted-element" containing
                // SVG icons and "(printed page NNNNN)" text.
                content = content.replace(/<span[^>]*\bunprinted-element\b[^>]*>[\s\S]*?<\/span>/gi, '');

                // Fallback: strip any remaining plain-text page markers
                content = content.replace(/\(\s*printed\s+page\s+\d+\s*\)/gi, '');
                content = content.replace(/\[\[Page\s+\d+\]\]/gi, '');

                return content;

            } else {
                // Plain text: find "PART 39--AIRWORTHINESS DIRECTIVES"
                const marker = 'PART 39--AIRWORTHINESS DIRECTIVES';
                const idx = content.indexOf(marker);
                if (idx !== -1) {
                    content = content.substring(idx);
                }

                // Also try with long dash
                if (idx === -1) {
                    const marker2 = 'PART 39\u2014AIRWORTHINESS DIRECTIVES';
                    const idx2 = content.indexOf(marker2);
                    if (idx2 !== -1) {
                        content = content.substring(idx2);
                    }
                }

                // Remove trailing billing/FR doc lines
                const frDocIdx = content.lastIndexOf('[FR Doc.');
                if (frDocIdx === -1) {
                    const frDocIdx2 = content.lastIndexOf('[FR Doc');
                    if (frDocIdx2 !== -1 && content.length - frDocIdx2 < 200) {
                        content = content.substring(0, frDocIdx2).trimEnd();
                    }
                } else if (content.length - frDocIdx < 200) {
                    content = content.substring(0, frDocIdx).trimEnd();
                }

                return content.trim();
            }
        }

        function makeADCard(adNum, title, docNum, content, format) {
            const card = document.createElement('div');
            card.className = 'ad-card';

            const header = document.createElement('div');
            header.className = 'ad-card-header';
            header.innerHTML = `
                <span>${escHtml(title)}</span>
                <span class="ad-doc-num">${escHtml(docNum)}</span>
            `;

            const body = document.createElement('div');
            body.className = 'ad-card-body ' + (format === 'html' ? 'html-content' : 'text-content');

            if (format === 'html') {
                body.innerHTML = content;
            } else {
                body.textContent = content;
            }

            card.appendChild(header);
            card.appendChild(body);
            return card;
        }

        function makeErrorCard(adNum, message) {
            const card = document.createElement('div');
            card.className = 'ad-card';

            const header = document.createElement('div');
            header.className = 'ad-card-header';
            header.style.background = 'var(--danger)';
            header.textContent = `AD ${adNum}`;

            const body = document.createElement('div');
            body.className = 'ad-card-body';
            body.style.padding = '20px';
            body.style.color = '#666';
            body.style.textAlign = 'center';
            body.textContent = message;

            card.appendChild(header);
            card.appendChild(body);
            return card;
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>

</html>
